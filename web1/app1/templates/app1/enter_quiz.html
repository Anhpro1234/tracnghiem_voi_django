{% extends 'app1/base.html' %}
{% block title %}Vào thi{% endblock %}
{% block content %}
<div class="container" style="max-width: 600px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px;">
    <h2>Xác nhận vào phòng thi</h2>
    <hr>
    <p>Bạn sắp tham gia vào đề thi:</p>
    <h3 style="color: #007bff;">{{ quiz.title }}</h3>
    <p>Môn: {{ quiz.subject.name }}</p>
    <p>Thời gian: <strong>{{ quiz.duration_minutes }} phút</strong></p>
    
    <div style="margin-top: 30px;">
        <a href="{% url 'take_quiz' quiz.room_id %}" 
           style="padding: 15px 30px; background: #28a745; color: white; text-decoration: none; border-radius: 5px;">
           BẮT ĐẦU LÀM BÀI
        </a>
    </div>
    <div style="margin-top: 20px;">
        <a href="{% url 'student_room' %}">Quay lại</a>
    </div>
</div>
{% endblock %}
